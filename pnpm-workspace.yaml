    three: ^0.183.2
    tinyexec: ^1.1.1
    tinyglobby: ^0.2.16
    ufo: ^1.6.3
    ultrahtml: ^1.6.0
    unctx: ^2.5.0
    unplugin-auto-import: ^21.0.0
    unplugin-icons: ^23.0.1
    unplugin-vue-components: ^32.0.0
    vite: ^8.0.8
    vite-plugin-pages: ^0.33.3
    vue: ^3.5.32
    ws: ^8.20.0

ignoredBuiltDependencies:
  - vue-demi

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@tailwindcss/oxide'
  - esbuild
  - puppeteer

packageExtensions:
  puppeteer-cluster:
    peerDependencies:
      puppeteer-core: '*'
    peerDependenciesMeta:
      puppeteer:
        optional: true
