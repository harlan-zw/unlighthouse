catalogMode: prefer

shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
packages:
  - packages/*
  - crux-api
  - '!docs'

overrides:
  rollup: 4.59.0
catalog:
  '@antfu/eslint-config': ^8.2.0
  '@arethetypeswrong/cli': 0.18.2
  '@types/lodash-es': ^4.17.12
  '@types/three': ^0.183.1
  '@types/ws': ^8.18.1
  '@vitejs/plugin-vue': ^6.0.6
  '@vue/compiler-sfc': ^3.5.32
  bumpp: ^11.0.1
  eslint: ^10.2.0
  obuild: ^0.4.33
  puppeteer: ^24.40.0
  typescript: ^6.0.2
  vitest: ^4.1.4

catalogs:
  crux-api:
    nitropack: latest
  dependencies:
    '@clack/prompts': ^1.2.0
    '@iconify-json/carbon': latest
    '@iconify-json/icomoon-free': latest
    '@iconify-json/la': latest
    '@iconify-json/logos': latest
    '@iconify-json/mdi': latest
    '@iconify-json/simple-line-icons': latest
    '@lhci/utils': ^0.15.1
    '@nuxt/ui': ^4.6.1
    '@puppeteer/browsers': ^2.13.0
    '@tailwindcss/vite': ^4.2.2
    '@vueuse/core': ^14.2.1
    '@vueuse/router': ^14.2.1
    c12: ^3.3.4
    cac: ^7.0.0
    chrome-launcher: ^1.2.1
    consola: ^3.4.2
    defu: ^6.1.7
    fuse.js: ^7.3.0
    h3: ^1.15.11
    hookable: ^6.1.0
    launch-editor: ^2.13.2
    lighthouse: ^13.1.0
    lightweight-charts: ^5.1.0
    listhen: ^1.9.1
    lodash-es: ^4.18.1
    ofetch: ^1.5.1
    pathe: ^2.0.3
    puppeteer-cluster: ^0.25.0
    puppeteer-core: ^24.40.0
    radix3: ^1.1.2
    regexparam: ^3.0.0
    sanitize-filename: ^1.6.4
    sitemapper: ^4.1.4
    slugify: ^1.6.9
    std-env: ^4.0.0
